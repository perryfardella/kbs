<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>KBS — Offline</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background: #0a0a0a;
        color: #f5f5f5;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }
      .card {
        text-align: center;
        max-width: 320px;
      }
      .icon {
        font-size: 3rem;
        margin-bottom: 1.5rem;
      }
      h1 {
        font-size: 1.25rem;
        font-weight: 600;
        color: #e8d5b0;
        margin-bottom: 0.75rem;
      }
      p {
        font-size: 0.9rem;
        color: #6b6b6b;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon">📵</div>
      <h1>You're offline</h1>
      <p>KBS needs a connection to load. Check your network and try again.</p>
    </div>
  </body>
</html>
